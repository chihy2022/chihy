<head>
    <!-- Nhúng file CSS (nhớ có ../ vì file css ở ngoài) -->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="roadmap-card" style="display: flex; gap: 40px; align-items: flex-start;">
    <div class="card-left" style="flex: 1;">
        <span style="color: #888; font-size: 14px;">01</span>
        <h1 style="font-size: 32px; margin: 10px 0;">Digital Roadmap 2026-2027</h1>
        <p style="color: #666; line-height: 1.6;">UMER phát triển bức tranh KPI Performance...</p>
    </div>
    
    <div class="card-right" style="flex: 1;">
        <!-- Dùng src="images/..." vì index.html gọi file này -->
        <img id="myImg" src="images/mobile.png" alt="Roadmap mobile" style="max-height: 900px;">
    </div>
</div>
        
    <!-- Khung Popup (Modal) - Hãy dán đoạn này xuống cuối trang -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="imgFull">
        <div id="caption"></div>
    </div>
</div>
<script src="../js/app.js"></script>
</body>
