<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Tiến Độ - Shot 5</title>
    <!-- Đi ra ngoài thư mục detail để tìm style.css -->
    <link rel="stylesheet" href="../style.css"> 
</head>
<body>

    <div class="report-container">
        <div class="top-bar">
            <h2>BÁO CÁO TIẾN ĐỘ DIGITAL (Shot 5)</h2>
            <button id="btnAddRow" class="btn-add">+ Thêm dòng mới</button>
        </div>

        <div class="table-scroll">
            <table id="main-table">
                <thead>
                    <tr>
                        <th>SESSION</th>
                        <th>A/U</th>
                        <th>TASK</th>
                        <th style="width: 25%;">MÔ TẢ</th>
                        <th>ƯU TIÊN</th>
                        <th>KHÁC</th>
                        <th>GHI CHÚ</th>
                        <th>TIẾN ĐỘ</th>
                        <th>STATUS</th>
                        <th>TIME LINE</th>
                        <th style="width: 80px;">THAO TÁC</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Dữ liệu sẽ đổ vào đây -->
                </tbody>
            </table>
        </div>
        <p class="help-text">* Chạm trực tiếp vào nội dung trong bảng để sửa. Dữ liệu tự lưu khi bạn click ra ngoài.</p>
    </div>

    <!-- Đi ra ngoài thư mục detail, vào thư mục js để tìm app.js -->
    <script src="../js/app.js"></script>
</body>
</html>
