<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unime System Dashboard</title>
    
    <!-- FONT CHỮ CAO CẤP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- THƯ VIỆN HỖ TRỢ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-btn-toggle" id="toggleBtn">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar">
                        <img src="images/logoUNILEVER.png" alt="Logo">
                    </div>
                    <div class="user-info-text">
                        <span class="username">Unime System</span>
                        <span class="user-description">DT Merchandising Channel</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-menu">
                <!-- Mục Dashboard chính -->
                <div class="menu-item active" data-shot="shot1">
                    <i class="fa-solid fa-house"></i> <span>Dashboard</span>
                </div>

                <!-- Group 1: INCOME -->
                <div class="menu-group">
                    <div class="group-header">
                        <div class="header-main">
                            <i class="fa-solid fa-wallet"></i> <!-- Icon ở Group ngoài -->
                            <span>INCOME</span> <!-- Chữ to hơn -->
                        </div>
                        <i class="fa-solid fa-chevron-down chevron-icon"></i>
                    </div>
                    <div class="group-content">
                        <!-- Menu Detail KHÔNG CÓ ICON -->
                        <div class="menu-item sub-item" data-shot="shot4"><span>Dash UNIME</span></div>
                        <div class="menu-item sub-item" data-shot="shot5"><span>Báo cáo tiến độ</span></div>
                    </div>
                </div>

                <!-- Group 2: REFUNDS -->
                <div class="menu-group">
                    <div class="group-header">
                        <div class="header-main">
                            <i class="fa-solid fa-rotate-left"></i>
                            <span>REFUNDS</span>
                        </div>
                        <i class="fa-solid fa-chevron-down chevron-icon"></i>
                    </div>
                    <div class="group-content">
                        <div class="menu-item sub-item" data-shot="shot1"><span>Canva</span></div>
                        <div class="menu-item sub-item" data-shot="shot3"><span>POSM Inventory</span></div>
                    </div>
                </div>

                <!-- Group 3: PROMOTE -->
                <div class="menu-group">
                    <div class="group-header">
                        <div class="header-main">
                            <i class="fa-solid fa-bullhorn"></i>
                            <span>PROMOTE</span>
                        </div>
                        <i class="fa-solid fa-chevron-down chevron-icon"></i>
                    </div>
                    <div class="group-content">
                        <div class="menu-item sub-item" data-shot="shot2"><span>Roadmap</span></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- NỘI DUNG CHÍNH -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h5 id="dynamic-header-title" class="current-title">Dashboard</h5>
                </div>
                <div class="header-right">
                    <button id="exportPdfBtn" class="btn-export">
                        <i class="fa-solid fa-file-pdf"></i> <span>Xuất PDF</span>
                    </button>
                </div>
            </header>
            <div id="content-area" class="content-body"></div>
        </main>
    </div>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="imgFull">
    </div>

    <script src="js/app.js"></script>
</body>
</html>
