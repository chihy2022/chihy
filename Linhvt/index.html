<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linhvt's</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR PHONG CÁCH NOTION -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                <!-- Logo khách hàng -->
                <div class="avatar">
                    <img id="myImg" src="images/logoUNILEVER.png" alt="Logo Unilever" style="cursor: zoom-in; width: 100%;">
                </div>

                <!-- Khối văn bản bao gồm Tên và Mô tả -->
                <div class="user-info-text">
                    <span class="username">Unime System</span>
                    <span class="user-description">Unilever Merchandising DT Channel</span>
                </div>
                </div>
                <!-- Nút đóng sidebar (chevron) nằm bên trong -->
                <button class="sidebar-btn-close" id="closeBtn">
                    <i class="fa-solid fa-angles-left"></i>
                </button>
            </div>
            <div class="sidebar-menu">
                <div class="menu-group">
                    <p class="group-title" style="padding: 25px 15px 10px 15px;font-size: 13px;color: #000000;">Lộ trình triển khai</p>
                    <div class="menu-item active" data-shot="shot1">
                        <i class="fa-regular fa-file-lines"></i> <span>Weekly Meeting</span>
                    </div>
                    <div class="menu-item" data-shot="shot2">
                        <i class="fa-regular fa-file-lines"></i> <span>Digital Roadmap</span>
                    </div>
                    <div class="menu-item" data-shot="shot3">
                        <i class="fa-solid fa-database"></i> <span>POSM Inventory</span>
                    </div>
                    <div class="menu-item" data-shot="shot4">
                        <i class="fa-solid fa-chart-line"></i> <span>Weekly Report</span>
                    </div>
                    <div class="menu-item" data-shot="shot5">
                        <i class="fa-solid fa-chart-line"></i> <span>Monthly Report</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- NỘI DUNG CHÍNH -->
        <main class="main-content" style="background: #fafafa;">
            <!-- Nút mở sidebar chỉ hiện khi sidebar bị ẩn -->
            <button class="open-sidebar-btn" id="openBtn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div id="content-area" class="content-body">
                <!-- Nội dung shot.html sẽ load vào đây -->
            </div>
        </main>
    </div>
    <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="imgFull">
    <div id="caption"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
