<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linhvt's</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
        <!-- Thêm thư viện chụp ảnh màn hình -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Thêm thư viện tạo PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Thư viện đọc file Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <!-- File JS của bạn -->
    <script src="script.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR PHONG CÁCH NOTION -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                <!-- Logo khách hàng -->
                <div class="avatar">
                    <img id="myImg" src="images/logoUNILEVER.png" alt="Logo Unilever" style="cursor: zoom-in; width: 100%;">
                </div>

                <!-- Khối văn bản bao gồm Tên và Mô tả -->
                <div class="user-info-text">
                    <span class="username">Unime System</span>
                    <span class="user-description">Unilever Merchandising DT Channel</span>
                </div>
                </div>
                <!-- Nút đóng sidebar (chevron) nằm bên trong -->
                <button class="sidebar-btn-close" id="closeBtn">
                    <i class="fa-solid fa-angles-left"></i>
                </button>
            </div>
            <div class="sidebar-menu">
                <div class="menu-group">
                    <p class="group-title" style="padding: 25px 15px 10px 15px;font-size: 13px;color: #000000;">Lộ trình triển khai</p>
                    <div class="menu-item active" data-shot="shot1">
                        <i class="fa-regular fa-file-lines"></i> <span>Canva</span>
                    </div>
                    <div class="menu-item" data-shot="shot2">
                        <i class="fa-solid fa-chart-line"></i> <span>Digital Roadmap</span>
                    </div>
                    <div class="menu-item" data-shot="shot3">
                        <i class="fa-solid fa-database"></i> <span>POSM Inventory</span>
                    </div>
                    <div class="menu-item" data-shot="shot4">
                        <i class="fa-solid fa-chart-line"></i> <span>Dash UNIME</span>
                    </div>
                    <div class="menu-item" data-shot="shot5">
                        <i class="fa-solid fa-chart-line"></i> <span>Báo cáo tiến độ</span>
                    </div>
                </div>
            </div>
        </aside>
        <!-- NỘI DUNG CHÍNH -->
            <main class="main-content" style="background: #fafafa; position: relative;">
                <!-- Thanh công cụ phía trên -->
                                <div class="main-header-actions">
                    <!-- Nhóm bên trái: Nút mở + Tiêu đề động -->
                    <div class="header-left-group">
                        <button class="open-sidebar-btn" id="openBtn">
                            <i class="fa-solid fa-bars"></i>
                        </button>
                        <div id="dynamic-header-title" class="current-page-title">
                            <!-- Chữ sẽ nhảy tự động -->
                        </div>
                    </div>

                    <!-- Nhóm bên phải: Gom Nav và Nút Xuất PDF lại với nhau -->
                    <div class="header-right-group">
                        <nav class="report-nav">
                            <div class="nav-container">
                                <a href="#execution-roadmap" class="nav-item">Execution Roadmap</a>
                                <a href="#use-case-powerhouse" class="nav-item">Use Case Powerhouse</a>
                                <a href="#raci-matrix" class="nav-item">RACI Matrix</a>
                            </div>
                        </nav>

                        <button id="exportPdfBtn" class="btn-export">
                            <i class="fa-solid fa-file-pdf"></i> <span>Xuất PDF</span>
                        </button>
                    </div>
                </div>

            <div id="content-area" class="content-body">
            <!-- Nội dung sẽ load vào đây. Đảm bảo trong các file shot.html có các ID tương ứng -->
            </div>
            </main>
    </div>
    <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="imgFull">
    <div id="caption"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
