<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0ea5e9);
}

/* LOGIN BOX */
.login-container{
    width:380px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(14,165,233,0.3);
    box-shadow:0 0 25px rgba(14,165,233,0.4);
    color:white;
}

/* TITLE */
.logo{
    text-align:center;
    font-size:2rem;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:30px;
}

/* INPUT */
.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.1);
    color:white;
}

.input-group input::placeholder{
    color:rgba(255,255,255,0.6);
}

/* OPTIONS */
.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    color:#38bdf8;
    text-decoration:none;
}

/* BUTTON */
.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#0ea5e9,#3b82f6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(14,165,233,0.4);
}

/* DIVIDER */
.divider{
    text-align:center;
    margin:20px 0;
    opacity:0.7;
}

/* SOCIAL */
.social{
    display:flex;
    gap:10px;
}

.social button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.google{
    background:white;
}

.facebook{
    background:#1877f2;
    color:white;
}

/* SIGNUP */
.signup{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.signup a{
    color:#38bdf8;
    font-weight:600;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="login-container">

    <div class="logo">🔐 LOGIN</div>
    <div class="subtitle">Welcome back!</div>

    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Nhập email">
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" placeholder="Nhập mật khẩu">
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Ghi nhớ
            </label>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <button class="login-btn">Đăng nhập</button>
    </form>

    <div class="divider">HOẶC</div>

    <div class="social">
        <button class="google">Google</button>
        <button class="facebook">Facebook</button>
    </div>

    <div class="signup">
        Chưa có tài khoản?
        <a href="#">Đăng ký</a>
    </div>

</div>

</body>
</html>
