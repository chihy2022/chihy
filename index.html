```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#ec4899);
}

.login-container{
    width:380px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    color:white;
}

.logo{
    text-align:center;
    font-size:2rem;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:white;
}

.input-group input::placeholder{
    color:rgba(255,255,255,0.7);
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
    font-size:14px;
}

.options a{
    color:white;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:white;
    color:#4f46e5;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
}

.divider{
    text-align:center;
    margin:20px 0;
    opacity:0.7;
}

.social{
    display:flex;
    gap:10px;
}

.social button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.google{
    background:#fff;
}

.facebook{
    background:#1877f2;
    color:white;
}

.signup{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.signup a{
    color:white;
    font-weight:600;
}
</style>
</head>

<body>

<div class="login-container">
    <div class="logo">🔐 Login</div>
    <p class="subtitle">Chào mừng quay trở lại</p>

    <form>
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Nhập email">
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" placeholder="Nhập mật khẩu">
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Ghi nhớ
            </label>
            <a href="#">Quên mật khẩu?</a>
        </div>

        <button class="login-btn">Đăng nhập</button>
    </form>

    <div class="divider">Hoặc</div>

    <div class="social">
        <button class="google">Google</button>
        <button class="facebook">Facebook</button>
    </div>

    <div class="signup">
        Chưa có tài khoản?
        <a href="#">Đăng ký ngay</a>
    </div>
</div>

</body>
</html>
```
