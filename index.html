<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:15px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#4facfe;
        }

        .btn-login{
            width:100%;
            padding:12px;
            background:#4facfe;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .btn-login:hover{
            background:#3399ff;
        }

        .extra{
            text-align:center;
            margin-top:15px;
        }

        .extra a{
            text-decoration:none;
            color:#4facfe;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Đăng nhập</h2>

        <form>
            <div class="input-group">
                <label>Tên đăng nhập</label>
                <input type="text" placeholder="Nhập username">
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Nhập mật khẩu">
            </div>

            <button type="submit" class="btn-login">Đăng nhập</button>

            <div class="extra">
                <p><a href="#">Quên mật khẩu?</a></p>
            </div>
        </form>
    </div>

</body>
</html>
